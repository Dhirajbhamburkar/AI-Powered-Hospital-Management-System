{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-warning">
            <h3>✏ Edit Staff</h3>
        </div>

        <div class="card-body">
 
            <form action="/update_staff" method="POST">

                <input type="hidden" name="staff_id" value="{{ staff[0] }}">

                <div class="mb-3">
                    <label>Staff Name</label>
                        <input type="text" class="form-control" name="staff_name" value="{{ staff[1] }}" required>
                </div>

                <div class="mb-3">
                    <label>Designation</label>
                        <input type="text" class="form-control" name="designation" value="{{ staff[2] }}" required>
                </div>

                <div class="mb-3">
                    <label>Department</label>
                        <input type="text" class="form-control" name="department" value="{{ staff[3] }}" required>
                </div>

                <div class="mb-3">
                    <label>Salary</label>
                        <input type="number" step="0.01" class="form-control" name="salary" value="{{ staff[4] }}" required>
                </div>

                <div class="mb-3">
                    <label>Mobile</label>
                        <input type="text" class="form-control" name="mobile" value="{{ staff[5] }}" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                        <input type="email" class="form-control" name="email" value="{{ staff[6] }}" required>
                </div>

                <div class="mb-3">
                    <label>Joining Date</label>
                        <input type="date" class="form-control" name="joining_date" value="{{ staff[7] }}" required>
                </div>

                <button class="btn btn-success">
                    💾 Update Staff
                </button>

                <a href="/staff" class="btn btn-secondary">
                    ⬅ Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
{% endblock %}
