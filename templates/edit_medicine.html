{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-warning">

            <h3>✏ Edit Medicine</h3>

        </div>

        <div class="card-body">

            <form action="/update_medicine" method="POST">

                <input
                    type="hidden"
                    name="medicine_id"
                    value="{{ medicine[0] }}">

                <div class="mb-3">

                    <label>Medicine Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="medicine_name"
                        value="{{ medicine[1] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>Company</label>

                    <input
                        type="text"
                        class="form-control"
                        name="company"
                        value="{{ medicine[2] }}">

                </div>

                <div class="mb-3">

                    <label>Category</label>

                    <input
                        type="text"
                        class="form-control"
                        name="category"
                        value="{{ medicine[3] }}">

                </div>

                <div class="mb-3">

                    <label>Price</label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="price"
                        value="{{ medicine[4] }}">

                </div>

                <div class="mb-3">

                    <label>Stock</label>

                    <input
                        type="number"
                        class="form-control"
                        name="stock"
                        value="{{ medicine[5] }}">

                </div>

                <div class="mb-3">

                    <label>Expiry Date</label>

                    <input
                        type="date"
                        class="form-control"
                        name="expiry_date"
                        value="{{ medicine[6] }}">

                </div>

                <button class="btn btn-success">
                    💾 Update Medicine
                </button>

                <a href="/pharmacy" class="btn btn-secondary">
                    ⬅ Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
{% endblock %}
