{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-success text-white">

            <h3>💊 Add New Medicine</h3>

        </div>

        <div class="card-body">

            <form action="/save_medicine" method="POST">

                <div class="mb-3">

                    <label class="form-label">Medicine Name</label>

                    <input
                        type="text"
                        name="medicine_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Company</label>

                    <input
                        type="text"
                        name="company"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Category</label>

                    <select
                        name="category"
                        class="form-select">

                        <option>Tablet</option>
                        <option>Capsule</option>
                        <option>Syrup</option>
                        <option>Injection</option>
                        <option>Powder</option>
                        <option>Drops</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Price</label>

                    <input
                        type="number"
                        step="0.01"
                        name="price"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Stock</label>

                    <input
                        type="number"
                        name="stock"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">Expiry Date</label>

                    <input
                        type="date"
                        name="expiry_date"
                        class="form-control">

                </div>

                <button
                    class="btn btn-success">

                    💾 Save Medicine

                </button>

                <a
                    href="/pharmacy"
                    class="btn btn-secondary">

                    ⬅ Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
{% endblock %}
